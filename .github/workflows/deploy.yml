name: Deploy Next.js to SiteGround

on:
  push:
    branches:
      - main # Se ejecutará cada vez que empujes cambios a la rama main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repositorio
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Configurar el entorno de Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Instalar las dependencias del proyecto
      - name: Install Dependencies
        run: npm ci

      # 4. Compilar el proyecto (Genera la carpeta 'out')
      - name: Build Project
        run: npm run build

      # 5. Subir los archivos resultantes a SiteGround vía FTP
      - name: Deploy to SiteGround
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/ # Subimos solo lo que Next.js compiló adentro de out
          server-dir: /public_html/ # La raíz de tu hosting en SiteGround